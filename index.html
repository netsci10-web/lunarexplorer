<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lunar 100 관측 트래커 (마커 디자인 개편)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Globe.gl (3D 구형 지도 라이브러리) -->
    <script src="https://unpkg.com/globe.gl"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #020617;
            overflow: hidden; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        
        #globe-container {
            cursor: grab;
            background-color: #000;
        }
        #globe-container:active {
            cursor: grabbing;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* 월령 아이콘 스타일 */
        .moon-icon-container {
            width: 42px;
            height: 42px;
            background-image: url('https://unpkg.com/three-globe/example/img/moon-surface.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            border: 2px solid #334155;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .moon-shadow {
            position: absolute;
            background: rgba(0, 0, 0, 0.85); 
            height: 100%;
            top: 0;
            transition: all 0.5s ease;
        }

        /* 상세 정보 슬라이드 애니메이션 */
        #detail-modal {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -15px 0 40px rgba(0,0,0,0.7);
        }
        .modal-hidden { transform: translateX(100%); }
        .modal-visible { transform: translateX(0); }

        /* =========================================
           새로운 지도 마커(HTML Element) CSS 스타일 
           ========================================= */
        .marker-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            pointer-events: auto;
            cursor: pointer;
            transition: z-index 0.2s;
        }
        .marker-container:hover {
            z-index: 999;
        }
        .marker-badge {
            width: 28px;
            height: 28px;
            background-color: #1e293b; /* 어두운 남색 배경 */
            border: 2px solid #cbd5e1; /* 밝은 회색 테두리 */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            font-weight: 900;
            font-size: 11px;
            font-family: 'Arial Black', sans-serif;
            box-shadow: 0 3px 6px rgba(0,0,0,0.7);
            transition: all 0.2s ease;
            z-index: 10;
        }
        .marker-container:hover .marker-badge {
            transform: scale(1.15);
            border-color: #60a5fa;
            box-shadow: 0 0 15px rgba(96, 165, 250, 0.6);
        }
        .marker-badge.completed {
            background-color: #064e3b; /* 관측 완료 시 진한 녹색 */
            border-color: #34d399; /* 밝은 녹색 테두리 */
            color: #ecfdf5;
        }
        .marker-badge.active {
            background-color: #1e3a8a; /* 선택 시 진한 파란색 */
            border-color: #60a5fa;
            transform: scale(1.2);
            box-shadow: 0 0 15px rgba(96, 165, 250, 0.8);
        }
        .marker-label {
            margin-top: 3px;
            color: #f8fafc;
            font-size: 12px;
            font-style: italic;
            font-family: Georgia, 'Times New Roman', serif; /* 클래식한 세리프 폰트 */
            text-shadow: 
                -1px -1px 0 #000,  
                 1px -1px 0 #000,
                -1px  1px 0 #000,
                 1px  1px 0 #000,
                 0px  3px 5px rgba(0,0,0,0.9); /* 강한 가독성을 위한 아웃라인과 그림자 */
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
            z-index: 10;
            transition: transform 0.2s ease;
        }
        .marker-container:hover .marker-label {
            transform: scale(1.1);
        }

        /* 지형 크기 비례 파란색 강조 링 */
        .active-ring {
            border: 3px solid rgba(96, 165, 250, 0.7);
            border-radius: 50%;
            position: absolute;
            top: 14px; /* 마커 배지의 정중앙 (28px / 2) */
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse-ring 2s infinite ease-out;
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.5), inset 0 0 15px rgba(59, 130, 246, 0.3);
            pointer-events: none;
            z-index: 1;
        }

        @keyframes pulse-ring {
            0% { transform: translate(-50%, -50%) scale(0.6); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.4); opacity: 0; }
        }
    </style>
</head>
<body class="text-slate-200 flex flex-col h-screen w-screen overflow-hidden relative font-sans">

    <!-- 상단 헤더 -->
    <header class="bg-slate-900/90 backdrop-blur py-3 px-6 shadow-md border-b border-slate-800 shrink-0 z-20 flex flex-wrap justify-between items-center gap-4">
        <div class="flex items-center gap-3">
            <h1 class="text-xl md:text-2xl font-bold tracking-wider text-slate-100 leading-none">
                🌕 <span class="text-blue-400 font-black">Lunar 100</span> 트래커
            </h1>
        </div>
        
        <div id="today-moon-info" class="flex items-center gap-3 bg-slate-950/50 px-4 py-1.5 rounded-full border border-slate-700/50 shadow-inner">
            <div class="moon-icon-container" id="moon-icon">
                <div class="moon-shadow" id="moon-shadow-overlay"></div>
            </div>
            <div class="flex flex-col">
                <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest leading-none mb-1">Today's Moon</span>
                <span id="current-moon-age" class="text-sm font-bold text-blue-400 leading-none tracking-tighter">계산 중...</span>
            </div>
        </div>
    </header>

    <!-- 메인 레이아웃 -->
    <main class="flex-1 flex flex-col md:flex-row min-h-0 overflow-hidden relative w-full">
        <!-- 3D 달 영역 -->
        <div id="globe-container" class="w-full h-[45%] md:h-full md:w-[65%] flex-shrink-0 md:flex-shrink relative z-0">
            <div id="globeViz" class="absolute inset-0"></div>
            <div class="absolute bottom-4 left-4 right-4 flex justify-between items-end pointer-events-none z-10">
                <div class="text-[10px] md:text-xs text-slate-300 bg-slate-900/80 p-2 rounded backdrop-blur border border-slate-700 shadow-lg">
                    <span class="inline-block w-2 h-2 rounded-full border-2 border-slate-400 bg-slate-800 mr-1"></span> 관측 전 
                    <span class="inline-block w-2 h-2 rounded-full border-2 border-emerald-400 bg-emerald-800 ml-2 mr-1"></span> 관측 완료
                </div>
            </div>
        </div>

        <!-- 우측 사이드 패널 -->
        <div id="side-panel" class="w-full h-[55%] md:h-full md:w-[35%] bg-slate-900 border-t md:border-t-0 md:border-l border-slate-800 relative overflow-hidden z-10 flex flex-col shadow-2xl">
            <!-- 목록 화면 -->
            <div id="list-view" class="w-full h-full overflow-y-auto scroll-smooth flex flex-col">
                <div class="sticky top-0 bg-slate-900/95 backdrop-blur py-3 px-4 border-b border-slate-800 flex justify-between items-end z-10">
                    <h2 class="text-lg font-bold text-blue-400 tracking-tight">관측 리스트</h2>
                    <div class="flex flex-col items-end">
                        <span id="progress-text" class="text-sm font-semibold text-emerald-400 font-mono">0 / 100</span>
                        <div class="w-24 h-1 bg-slate-800 rounded-full mt-1 overflow-hidden">
                            <div id="progress-bar" class="h-full bg-emerald-500 transition-all duration-500" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
                <div id="lunar-list" class="p-3 space-y-2 pb-10"></div>
            </div>

            <!-- 상세 정보 화면 -->
            <div id="detail-modal" class="absolute inset-0 bg-slate-900 z-20 hidden flex-col modal-hidden">
                <div class="flex justify-between items-center p-4 border-b border-slate-800 bg-slate-800/50 shrink-0">
                    <h3 id="modal-title" class="text-base md:text-lg font-bold text-blue-400 truncate pr-2"></h3>
                    <button onclick="closeModal()" class="text-slate-300 hover:text-white flex items-center gap-1 text-sm bg-slate-700/50 px-3 py-1.5 rounded transition-colors whitespace-nowrap font-bold">
                        <span>◀</span> 목록으로
                    </button>
                </div>
                <div class="p-5 overflow-y-auto flex-grow pb-10 font-sans">
                    <div id="modal-best-day" class="mb-4 text-xs font-bold px-3 py-2 rounded-lg bg-blue-900/30 border border-blue-500/30 text-blue-300 flex items-center gap-2 font-mono">
                        <span>📅 관측 권장 시기:</span>
                        <span id="modal-best-day-value"></span>
                    </div>
                    
                    <div class="space-y-6 mt-4">
                        <section>
                            <h4 class="text-blue-400 text-[10px] font-black uppercase tracking-[0.2em] mb-2 flex items-center gap-2 opacity-80">
                                <span class="w-1.5 h-1.5 bg-blue-500 rounded-full"></span> SIGNIFICANCE
                            </h4>
                            <p id="modal-desc" class="text-slate-200 text-sm leading-relaxed whitespace-pre-wrap bg-slate-950/30 p-5 rounded-2xl border border-slate-800/50 shadow-inner font-medium"></p>
                        </section>
                        
                        <section id="modal-coords-section">
                            <h4 class="text-emerald-400 text-[10px] font-black uppercase tracking-[0.2em] mb-2 flex items-center gap-2 opacity-80">
                                <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span> DATA SHEET
                            </h4>
                            <div id="modal-coords" class="text-xs text-slate-400 bg-slate-950/50 border border-slate-800 p-4 rounded-2xl font-mono leading-relaxed"></div>
                        </section>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let activeId = null;

        // PDF 기반 1~100번 전체 실제 지형 데이터
        const lunar100Data = [
            { id: 1, name: "달", eng: "Moon", desc: "지구의 거대한 위성입니다. 맨눈으로도 보이는 고지대(밝은 부분)와 바다(어두운 부분)의 전체적인 대조를 관찰하세요.", lat: null, lng: null, day: 14, diam: 3476 },
            { id: 2, name: "지구조", eng: "Earthshine", desc: "지구에서 두 번 반사된 태양빛이 달의 어두운 부분을 희미하게 비추는 현상입니다. '그믐달 속 보름달'처럼 보입니다.", lat: null, lng: null, day: 2, diam: 3476 },

            { id: 4, name: "아펜니노 산맥", eng: "Apennines", desc: "비의 바다(Mare Imbrium) 분지 테두리를 형성하는 장엄한 산맥입니다. 최고 높이는 약 5km에 달합니다.", lat: "18.9N", lng: "3.7W", day: 7, diam: 400 },
            { id: 5, name: "코페르니쿠스", eng: "Copernicus", desc: "전형적인 대형 복합 크레이터입니다. 계단식 내벽, 중앙 봉우리, 그리고 주변으로 길게 뻗은 화려한 광조(Ray)가 특징입니다.", lat: "9.7N", lng: "20.1W", day: 9, diam: 93 },
            { id: 6, name: "티코", eng: "Tycho", desc: "달 남부 고지대의 젊고 밝은 크레이터입니다. 보름달 때 달 전체를 가로지르는 거대한 광조 시스템의 중심입니다.", lat: "43.4S", lng: "11.1W", day: 9, diam: 102 },
            { id: 7, name: "알타이 절벽", eng: "Altai Scarp", desc: "감로주의 바다(Mare Nectaris) 충돌 분지의 다중 고리 중 하나로, 거대한 단층 절벽 지형입니다.", lat: "24.3S", lng: "22.6E", day: 5, diam: 425 },
            { id: 8, name: "테오필루스 삼총사", eng: "Theophilus, Cyrillus, Catharina", desc: "나란히 배열된 세 크레이터입니다. 북쪽에서 남쪽으로 갈수록 노화되는 크레이터 풍화 단계를 보여줍니다.", lat: "13.2S", lng: "24.0E", day: 5, diam: 110 },
            { id: 9, name: "클라비우스", eng: "Clavius", desc: "남부 고지대의 거대 크레이터입니다. 내부에 아치형으로 배열된 소크레이터 체인이 인상적입니다.", lat: "58.8S", lng: "14.1W", day: 9, diam: 225 },
            { id: 10, name: "위기의 바다", eng: "Mare Crisium", desc: "독립된 원형 분지에 담긴 바다입니다. 해 뜰 무렵 내부에 형성된 주름 능선(Dorsum)들이 아름답게 관찰됩니다.", lat: "18.0N", lng: "59.0E", day: 2, diam: 540 },
            { id: 11, name: "아리스타르쿠스", eng: "Aristarchus", desc: "달에서 가장 반사율이 높은(밝은) 지형입니다. 내벽에 어두운 띠와 인근 슈뢰터 계곡을 함께 관찰하세요.", lat: "23.7N", lng: "47.4W", day: 11, diam: 40 },
            { id: 12, name: "프로클루스", eng: "Proclus", desc: "비스듬한 충돌로 인해 광조가 한쪽 방향을 제외하고 부채꼴 모양으로 펼쳐진 독특한 크레이터입니다.", lat: "16.1N", lng: "46.8E", day: 4, diam: 28 },
            { id: 13, name: "가상디", eng: "Gassendi", desc: "습기의 바다 가장자리에 위치한 지면 파쇄 크레이터(FFC)입니다. 용암 융기로 인해 바닥이 갈라진 미세한 틈들을 관찰하세요.", lat: "17.6S", lng: "40.1W", day: 10, diam: 101 },

            { id: 16, name: "페타비우스", eng: "Petavius", desc: "바닥에 중앙 봉우리에서 뻗은 거대한 균열 계곡(Rimae Petavius)이 특징인 매우 역동적인 모습의 대형 크레이터입니다.", lat: "25.1S", lng: "60.4E", day: 2, diam: 177 },
            { id: 17, name: "슈뢰터 계곡", eng: "Schröter's Valley", desc: "달에서 가장 크고 긴 사행성(구불구불한) 용암 계곡입니다. 과거 달의 강력했던 화산 활동 증거입니다.", lat: "26.2N", lng: "50.8W", day: 11, diam: 168 },

            { id: 19, name: "알프스 계곡", eng: "Alpine Valley", desc: "알프스 산맥을 직선으로 가로지르는 166km 길이의 거대 지구대(Graben)입니다. 중앙의 미세한 계곡을 찾아보세요.", lat: "49.0N", lng: "3.0E", day: 7, diam: 165 },
            { id: 20, name: "포시도니우스", eng: "Posidonius", desc: "바닥이 용암에 의해 융기되어 복잡한 능선과 계곡이 어우러진 대표적인 지면 파쇄 크레이터입니다.", lat: "31.8N", lng: "29.9E", day: 5, diam: 95 },
            { id: 21, name: "프라카스토리우스", eng: "Fracastorius", desc: "감로주의 바다 용암에 의해 바닥이 내려앉고 한쪽 벽이 무너진 오래된 크레이터입니다.", lat: "21.5S", lng: "33.2E", day: 5, diam: 124 },
            { id: 22, name: "아리스타르쿠스 고원", eng: "Aristarchus Plateau", desc: "화쇄암 물질로 덮인 미스터리한 사각형 모양의 융기 지역입니다. 주변 고지대와 색상이 다릅니다.", lat: "26.0N", lng: "51.0W", day: 11, diam: 200 },
            { id: 23, name: "피코 산", eng: "Pico", desc: "비의 바다 한가운데 고립되어 솟아 있는 거대 산 봉우리입니다. 분지 내부 고리의 파편입니다.", lat: "45.7N", lng: "8.9W", day: 7, diam: 25 },
            { id: 24, name: "히기누스 계곡", eng: "Hyginus Rille", desc: "화산 폭발이나 붕괴로 인해 형성된 구덩이들이 사슬처럼 이어진 독특한 화산성 계곡 지형입니다.", lat: "7.4N", lng: "7.8E", day: 6, diam: 220 },
            { id: 25, name: "메시에 & 메시에 A", eng: "Messier & Messier A", desc: "비스듬한 충돌로 생성된 혜성 꼬리 같은 광조를 가진 특이한 크레이터 쌍입니다.", lat: "1.9S", lng: "47.6E", day: 4, diam: 15 },
            { id: 26, name: "추위의 바다", eng: "Mare Frigoris", desc: "달 북극 근처의 가늘고 긴 바다입니다. 형성 원인에 대한 다양한 지질학적 가설이 존재합니다.", lat: "56.0N", lng: "1.4E", day: 5, diam: 1590 },

            { id: 95, name: "폭풍의 대양", eng: "Procellarum basin", desc: "달에서 가장 거대한 충돌 분지 흔적으로 바다 전체를 포함합니다.", lat: "23.0N", lng: "15.0W", day: 14, diam: 3200 },
            { id: 96, name: "라이프니츠 산맥", eng: "Leibnitz Mountains", desc: "남극-에이트켄 분지의 테두리 융기부로 남극 실루엣을 만듭니다.", lat: "85.0S", lng: "30.0E", day: 8, diam: 100 },
            { id: 97, name: "인기라미 계곡", eng: "Inghirami Valley", desc: "동쪽의 바다 형성 시 만들어진 방사형 계곡 지형입니다.", lat: "44.0S", lng: "73.0W", day: 13, diam: 140 },
            { id: 98, name: "비의 바다 용암류", eng: "Imbrium lava flows", desc: "서로 다른 시기에 분출된 용암 경계인 낮은 턱 지형입니다.", lat: "32.8N", lng: "22.0W", day: 10, diam: 100 },
            { id: 99, name: "이나 화산", eng: "Ina", desc: "최근의 화산 활동 가능성을 보여주는 D자 모양 구덩이입니다.", lat: "18.6N", lng: "5.3E", day: 8, diam: 3 },
            { id: 100, name: "가장자리 바다 소용돌이", eng: "Mare Marginis swirls", desc: "자기장 영향으로 형성된 신비로운 밝은 소용돌이 무늬입니다.", lat: "18.5N", lng: "88.0E", day: 2, diam: 200 }
        ];

        function parseCoord(s) {
            if (!s) return 0;
            let v = parseFloat(s);
            if (s.includes('S') || s.includes('W')) v = -v;
            return v;
        }

        const globeData = lunar100Data
            .filter(d => d.lat !== null)
            .map(d => ({ ...d, latNum: parseCoord(d.lat), lngNum: parseCoord(d.lng) }));

        const STORAGE_KEY = 'lunar100_v14_badge_design';
        let progress = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

        let moonGlobe;

        document.addEventListener('DOMContentLoaded', () => {
            const globeContainer = document.getElementById('globe-container');
            if (!globeContainer) return;

            const initWidth = globeContainer.clientWidth || window.innerWidth * 0.65;
            const initHeight = globeContainer.clientHeight || window.innerHeight * 0.5;

            moonGlobe = Globe()(document.getElementById('globeViz'))
                .width(initWidth)
                .height(initHeight)
                .globeImageUrl('https://unpkg.com/three-globe/example/img/moon-surface.jpg')
                .bumpImageUrl('https://unpkg.com/three-globe/example/img/moon-surface.jpg')
                .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
                .showAtmosphere(false)
                // 업로드된 이미지 스타일에 맞춰 모든 마커를 HTML로 렌더링
                .htmlElementsData(globeData)
                .htmlLat('latNum')
                .htmlLng('lngNum')
                .htmlElement(d => {
                    const el = document.createElement('div');
                    el.className = 'marker-container';
                    
                    const isCompleted = progress[d.id];
                    const isActive = d.id === activeId;
                    
                    // 배지 (원형)
                    const badge = document.createElement('div');
                    badge.className = `marker-badge ${isCompleted ? 'completed' : ''} ${isActive ? 'active' : ''}`;
                    badge.innerHTML = `L${d.id}`;
                    
                    // 라벨 (이탤릭 영문 텍스트)
                    const label = document.createElement('div');
                    label.className = 'marker-label';
                    label.innerHTML = d.eng;
                    
                    el.appendChild(badge);
                    el.appendChild(label);
                    
                    // 선택된 마커 파란색 링 강조
                    if (isActive) {
                        const ringSize = Math.min(320, Math.max(55, d.diam * 0.65));
                        const ring = document.createElement('div');
                        ring.className = 'active-ring';
                        ring.style.width = `${ringSize}px`;
                        ring.style.height = `${ringSize}px`;
                        el.appendChild(ring);
                        
                        el.style.zIndex = "1000"; // 활성화 시 맨 위로
                    }

                    el.onclick = (e) => {
                        e.stopPropagation();
                        openModal(d.id);
                    };
                    
                    return el;
                });

            const resizeObserver = new ResizeObserver(() => {
                if(globeContainer && moonGlobe) {
                    moonGlobe.width(globeContainer.clientWidth).height(globeContainer.clientHeight);
                }
            });
            resizeObserver.observe(globeContainer);

            updateMoonIcon(calculateMoonAge(new Date()));
            
            setTimeout(() => resetGlobeView(), 500);
            renderList();
        });

        function calculateMoonAge(date) {
            let year = date.getFullYear(), month = date.getMonth() + 1, day = date.getDate();
            if (month < 3) { year--; month += 12; } month++;
            let jd = (365.25 * year) + (30.6 * month) + day - 694039.09; 
            jd /= 29.5305882; 
            return (jd - Math.floor(jd)) * 29.5305882;
        }

        function updateMoonIcon(age) {
            const shadow = document.getElementById('moon-shadow-overlay');
            if (!shadow) return;
            
            if (age <= 14.76) {
                const w = (1 - (age / 14.76)) * 100;
                shadow.style.setProperty('left', '0');
                shadow.style.setProperty('right', 'auto');
                shadow.style.setProperty('width', `${w}%`);
            } else {
                const w = ((age - 14.76) / 14.76) * 100;
                shadow.style.setProperty('left', 'auto');
                shadow.style.setProperty('right', '0');
                shadow.style.setProperty('width', `${w}%`);
            }
            
            const ageText = document.getElementById('current-moon-age');
            if(ageText) ageText.innerText = `월령 ${age.toFixed(1)}일`;
        }

        function resetGlobeView() {
            if(moonGlobe) moonGlobe.pointOfView({ lat: 0, lng: 0, altitude: 2.3 }, 1500);
        }

        window.openModal = function(id) {
            const item = lunar100Data.find(d => d.id === id);
            if (!item) return;
            activeId = id;
            
            if (item.lat && moonGlobe) {
                // 활성 상태 변경을 위한 HTML 요소 데이터 갱신
                moonGlobe.htmlElementsData([...globeData]);  
                const alt = Math.max(0.12, Math.min(0.7, item.diam / 1000));
                moonGlobe.pointOfView({ lat: parseCoord(item.lat), lng: parseCoord(item.lng), altitude: alt }, 1200);
            }
            
            const modal = document.getElementById('detail-modal');
            const titleEl = document.getElementById('modal-title');
            const descEl = document.getElementById('modal-desc');
            const bestDayEl = document.getElementById('modal-best-day-value');
            const coordsSection = document.getElementById('modal-coords-section');
            const coordsDiv = document.getElementById('modal-coords');

            if(titleEl) titleEl.innerHTML = `${item.name} <span class="text-xs text-slate-500 font-normal ml-1">(${item.eng})</span>`;
            if(descEl) descEl.innerText = item.desc;
            if(bestDayEl) bestDayEl.innerText = `월령 ${item.day}일 경`;
            
            if (item.lat && coordsDiv && coordsSection) {
                coordsDiv.innerHTML = `📍 위치: 위도 ${item.lat}, 경도 ${item.lng}<br>📏 지름: 약 ${item.diam}km`;
                coordsSection.style.setProperty('display', 'block');
            } else if (coordsSection) {
                coordsSection.style.setProperty('display', 'none');
            }
            
            if(modal) {
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modal.classList.remove('modal-hidden');
                    modal.classList.add('modal-visible');
                }, 10);
            }
        };

        window.closeModal = function() {
            activeId = null;
            if (moonGlobe) {
                moonGlobe.htmlElementsData([...globeData]); // 상태 복구를 위한 데이터 갱신
            }
            resetGlobeView();
            
            const modal = document.getElementById('detail-modal');
            if (modal) {
                modal.classList.remove('modal-visible');
                modal.classList.add('modal-hidden');
                setTimeout(() => modal.classList.add('hidden'), 400);
            }
        };

        window.toggleProgress = function(event, id) {
            event.stopPropagation(); 
            progress[id] = !progress[id];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
            if (moonGlobe) {
                moonGlobe.htmlElementsData([...globeData]); // 체크 상태 변경에 따른 마커 색상 갱신
            }
            renderList();
        };

        function renderList() {
            const listContainer = document.getElementById('lunar-list');
            const progressText = document.getElementById('progress-text');
            const progressBar = document.getElementById('progress-bar');
            
            if (!listContainer) return;

            let completedCount = 0;
            const listHTML = lunar100Data.map(item => {
                const isChecked = progress[item.id];
                if (isChecked) completedCount++;
                const cardClass = isChecked 
                    ? 'bg-emerald-950/20 border-emerald-500/40 shadow-[inset_0_0_15px_rgba(16,185,129,0.05)]' 
                    : 'bg-slate-800/60 border-slate-700/50 hover:border-blue-500 transition-all duration-300';
                const titleClass = isChecked ? 'text-slate-400 line-through opacity-70 italic' : 'text-slate-100 font-bold';
                return `
                    <div id="list-item-${item.id}" class="p-3.5 rounded-2xl border ${cardClass} flex items-start gap-4 cursor-pointer group shadow-lg" onclick="openModal(${item.id})">
                        <div class="flex-shrink-0 pt-0.5">
                            <input type="checkbox" class="w-5 h-5 cursor-pointer accent-emerald-500 rounded-lg border-2 border-slate-600 bg-slate-900 transition-transform active:scale-90" ${isChecked ? 'checked' : ''} onclick="toggleProgress(event, ${item.id})">
                        </div>
                        <div class="flex-grow overflow-hidden">
                            <div class="flex justify-between items-start">
                                <div class="flex flex-col">
                                    <h3 class="text-sm ${titleClass} truncate group-hover:text-blue-400 transition-colors">
                                        <span class="text-blue-500/80 mr-2 font-mono text-xs">L${item.id}</span>${item.name} <span class="text-xs font-normal">(${item.eng})</span>
                                    </h3>
                                    <p class="text-[11px] leading-tight text-slate-400 mt-1.5 line-clamp-1 opacity-60 group-hover:opacity-100">${item.desc}</p>
                                </div>
                                <div class="flex flex-col items-end gap-1.5 shrink-0 ml-3">
                                    <span class="bg-blue-900/40 text-blue-300 text-[9px] px-1.5 py-0.5 rounded-full border border-blue-500/20 font-bold font-mono tracking-tighter uppercase">DAY ${item.day}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            listContainer.innerHTML = listHTML;
            
            if (progressText) {
                progressText.innerText = `${completedCount} / 100`;
            }
            if (progressBar) {
                progressBar.style.setProperty('width', `${completedCount}%`);
            }
        }
    </script>
</body>
</html>
